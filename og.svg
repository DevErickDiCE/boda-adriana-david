<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Fondo degradado cálido -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#FAF8F4"/>
      <stop offset="55%" stop-color="#F2EBE0"/>
      <stop offset="100%" stop-color="#EDE4D5"/>
    </linearGradient>
    <!-- Halo dorado central -->
    <radialGradient id="halo" cx="50%" cy="50%" r="55%">
      <stop offset="0%"  stop-color="#C8A870" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#C8A870" stop-opacity="0"/>
    </radialGradient>
    <!-- Halo superior -->
    <radialGradient id="haloTop" cx="50%" cy="0%" r="60%">
      <stop offset="0%"  stop-color="#C8A870" stop-opacity="0.11"/>
      <stop offset="100%" stop-color="#C8A870" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Fondo -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#haloTop)"/>
  <rect width="1200" height="630" fill="url(#halo)"/>

  <!-- Marco exterior — línea fina elegante -->
  <rect x="32" y="32" width="1136" height="566" fill="none" stroke="#E0D3BF" stroke-width="1"/>
  <!-- Marco interior — dorado muy sutil -->
  <rect x="48" y="48" width="1104" height="534" fill="none" stroke="#DEC08E" stroke-width="0.5" opacity="0.45"/>

  <!-- Esquinas decorativas exteriores -->
  <!-- top-left -->
  <path d="M32 80 L32 32 L80 32" fill="none" stroke="#DEC08E" stroke-width="1.2"/>
  <!-- top-right -->
  <path d="M1120 32 L1168 32 L1168 80" fill="none" stroke="#DEC08E" stroke-width="1.2"/>
  <!-- bottom-left -->
  <path d="M32 550 L32 598 L80 598" fill="none" stroke="#DEC08E" stroke-width="1.2"/>
  <!-- bottom-right -->
  <path d="M1120 598 L1168 598 L1168 550" fill="none" stroke="#DEC08E" stroke-width="1.2"/>

  <!-- EYEBROW -->
  <text
    x="600" y="182"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="13"
    font-weight="normal"
    fill="#C8A870"
    text-anchor="middle"
    letter-spacing="6"
  >CON TODO NUESTRO AMOR OS INVITAMOS A</text>

  <!-- Línea decorativa izquierda -->
  <line x1="160" y1="196" x2="520" y2="196" stroke="#DEC08E" stroke-width="0.7" opacity="0.55"/>
  <!-- hojas izquierda -->
  <path d="M220 196 C222 190 230 188 229 196" stroke="#C8A870" stroke-width="0.8" fill="none" opacity="0.5"/>
  <path d="M250 196 C252 188 262 186 260 196" stroke="#C8A870" stroke-width="0.8" fill="none" opacity="0.5"/>
  <path d="M280 196 C282 190 290 188 289 196" stroke="#C8A870" stroke-width="0.8" fill="none" opacity="0.45"/>
  <path d="M220 196 C222 202 230 204 229 196" stroke="#C8A870" stroke-width="0.8" fill="none" opacity="0.35"/>
  <path d="M250 196 C252 204 262 206 260 196" stroke="#C8A870" stroke-width="0.8" fill="none" opacity="0.35"/>
  <!-- diamante -->
  <rect x="596" y="192" width="8" height="8" transform="rotate(45 600 196)" fill="#C8A870" opacity="0.6"/>
  <rect x="598" y="194" width="4" height="4" transform="rotate(45 600 196)" fill="#F2EBE0" opacity="0.9"/>
  <!-- Línea decorativa derecha (espejo) -->
  <line x1="680" y1="196" x2="1040" y2="196" stroke="#DEC08E" stroke-width="0.7" opacity="0.55"/>
  <path d="M980 196 C978 190 970 188 971 196" stroke="#C8A870" stroke-width="0.8" fill="none" opacity="0.5"/>
  <path d="M950 196 C948 188 938 186 940 196" stroke="#C8A870" stroke-width="0.8" fill="none" opacity="0.5"/>
  <path d="M920 196 C918 190 910 188 911 196" stroke="#C8A870" stroke-width="0.8" fill="none" opacity="0.45"/>
  <path d="M980 196 C978 202 970 204 971 196" stroke="#C8A870" stroke-width="0.8" fill="none" opacity="0.35"/>
  <path d="M950 196 C948 204 938 206 940 196" stroke="#C8A870" stroke-width="0.8" fill="none" opacity="0.35"/>

  <!-- NOMBRES — serif italic grande -->
  <text
    x="600" y="340"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="138"
    font-weight="normal"
    font-style="italic"
    fill="#261810"
    text-anchor="middle"
    letter-spacing="-2"
    opacity="0.92"
  >Adriana &amp; David</text>

  <!-- Línea separadora bajo nombres -->
  <line x1="400" y1="375" x2="800" y2="375" stroke="#E0D3BF" stroke-width="0.8" opacity="0.6"/>

  <!-- FECHA -->
  <text
    x="600" y="432"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="26"
    font-weight="normal"
    font-style="italic"
    fill="#6A5444"
    text-anchor="middle"
    letter-spacing="1"
    opacity="0.85"
  >19 de Junio · 2026</text>

  <!-- LUGAR -->
  <text
    x="600" y="472"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="13"
    font-weight="normal"
    fill="#A08870"
    text-anchor="middle"
    letter-spacing="4.5"
    opacity="0.8"
  >CATEDRAL DE LA MAGDALENA · GETAFE</text>

</svg>
